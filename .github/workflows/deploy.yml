name: Deploy SIPUS to InfinityFree

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        
    - name: Install dependencies
      run: composer install --no-dev --optimize-autoloader
      
    - name: Create .env file
      run: |
        cat > .env << EOF
        CI_ENVIRONMENT = production
        app.baseURL = '${{ secrets.APP_URL }}'
        database.default.hostname = ${{ secrets.DB_HOST }}
        database.default.database = ${{ secrets.DB_NAME }}
        database.default.username = ${{ secrets.DB_USER }}
        database.default.password = ${{ secrets.DB_PASS }}
        database.default.DBDriver = MySQLi
        database.default.port = 3306
        encryption.key = ${{ secrets.ENCRYPTION_KEY }}
        session.driver = 'CodeIgniter\Session\Handlers\FileHandler'
        session.savePath = /tmp/writable/session
        logger.threshold = 4
        EOF
        
    - name: Create writable directories
      run: |
        mkdir -p writable/cache writable/logs writable/session writable/uploads
        chmod -R 777 writable
        
    - name: Deploy via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_HOST }}
        username: ${{ secrets.FTP_USER }}
        password: ${{ secrets.FTP_PASS }}
        local-dir: ./
        server-dir: /htdocs/
        exclude: |
          .git/**
          .github/**
          node_modules/**
          tests/**
          writable/cache/**
          writable/logs/**
          writable/session/**
          *.md
          Dockerfile
          docker-compose.yml
          fly.toml
          render.yaml
